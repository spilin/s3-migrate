# Subcommand `fix-gaps` only needs work_dir, pad_width, download_concurrency (no source/destination).
# fix_gaps:
#   log_file: fix_gaps.jsonl   # optional JSONL: gap_found, gap_filled, gap_fill_failed
#
# Subcommand `archive-gaps` needs destination + work_dir + archive_prefix; optional JSONL default path:
# archive_gaps:
#   log_file: archive_gaps.jsonl   # archive_problem, archive_repaired, archive_repair_failed
#
# Subcommand `download` uses source + work_dir + state_file only (no destination required).
# Batches are stored under work_dir/batch_<first>_<last>/ (inclusive directory index range).
#
# Source: exactly one of source.aws or source.b2 (reads numbered dirs from S3-compatible storage).
# Key prefix before padded dir names is source.*.prefix (e.g. "" -> "000009820210/...").
source:
  aws:
    bucket: my-source-bucket
    prefix: "" # optional, e.g. "data/"
    region: us-east-1
    endpoint: "" # empty = standard AWS S3
    # Optional: IAM user keys (both required if set). Omit for EC2 role / env / profile.
    # access_key_id: YOUR_AWS_ACCESS_KEY
    # secret_key: YOUR_AWS_SECRET_KEY

# Alternative source — Backblaze B2 (omit source.aws when using this):
# source:
#   b2:
#     bucket: my-source-b2-bucket
#     prefix: ""
#     region: eu-central-003
#     access_key_id: YOUR_B2_APPLICATION_KEY_ID
#     secret_key: YOUR_B2_APPLICATION_KEY

# Default AWS credential chain / region fallback when source is AWS (IAM on EC2, profile, etc.).
aws:
  profile: ""
  region: us-east-1

# Destination: exactly one of destination.r2, destination.b2, or destination.s3 (MinIO / custom S3).
destination:
  r2:
    bucket: my-r2-bucket
    account_id: YOUR_CF_ACCOUNT_ID
    access_key_id: YOUR_R2_ACCESS_KEY
    secret_key: YOUR_R2_SECRET_KEY
    region: auto

# Alternative destination — Backblaze B2 (omit destination.r2 when using this):
# destination:
#   b2:
#     bucket: my-b2-bucket
#     region: eu-central-003
#     access_key_id: YOUR_B2_APPLICATION_KEY_ID
#     secret_key: YOUR_B2_APPLICATION_KEY

# Alternative destination — MinIO or any S3-compatible API (path-style; omit r2 and b2):
# destination:
#   s3:
#     endpoint: https://minio.example.com:9000
#     bucket: my-archives-bucket
#     region: us-east-1 # signing region; optional, default us-east-1
#     access_key_id: YOUR_MINIO_ACCESS_KEY
#     secret_key: YOUR_MINIO_SECRET_KEY

# Legacy flat keys are still accepted if you omit source/destination blocks:
#   s3.* + b2_source.* (B2 source) map to source.aws / source.b2; r2.* / b2.* map to destination.

# Subcommand `copy-archives`: stream existing archive objects from source bucket → destination (no packing).
# Uses the same source.* bucket/credentials; lists keys under source_prefix (not source.b2.prefix).
# Default: only copies keys matching <first>-<last>.tar.gz or .tar.zst. Set copy_all_under_prefix: true for any object.
# archive_copy:
#   source_prefix: archives/
#   dest_prefix: "" # empty = use same object key on destination; or e.g. archives to rewrite layout
#   concurrency: 5 # optional; default download_concurrency
#   copy_all_under_prefix: false
#   max_bytes_per_second: 12500000 # optional total cap (~100 Mbit/s) shared across all concurrent copies
#   # max_megabits_per_second: 100 # alternative to max_bytes_per_second when the latter is 0

# Migration settings — iterate by number; no S3 list of prefixes
start_from: 9820210 # directory number to start (e.g. 9820210 -> 000009820210)
stop_at: 0 # optional max number (0 = no limit)
pad_width: 12 # zero-pad width for directory names (000009820210)
download_concurrency: 5 # parallel file downloads per directory (lower if hitting S3 503 SlowDown)
directory_concurrency: 10 # parallel directory processing (lower if hitting S3 rate limits)
batch_dirs: 1000000 # pack & upload when this many dirs accumulated (archive: 1000001-2000000.tar.zst)
compression: zstd # gzip or zstd (zstd ~15-25% better for JSON)
compression_level: 6 # zstd level 1-22 (default 6; good for JSON; gzip ignores)
consecutive_empty: 1000 # stop after this many consecutive empty dirs
archive_prefix: archives # destination prefix for archives (default: archives)
work_dir: . # relative to cwd (default: current dir for batches)
state_file: state.json # relative to cwd (default: ./state.json)
stats_file: stats.jsonl # JSONL: migrate batch stats; validate-ranges appends a line with missing ranges on failure; empty = disabled
